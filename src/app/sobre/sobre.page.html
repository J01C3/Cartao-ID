<ion-header class="ion-no-border">
  <div class="header-custom">
    <span class="titulo-header">Ajuste de Cores</span>
  </div>
</ion-header>

<ion-content class="color-content">
  <div class="main-bg" [style.background-color]="bgGradient">

    <div class="wrapper">
      <div class="card-ajuste-fixo">
        <div class="card-padding">

          <div class="avatar-container">
            <img src="assets/RGB.png" alt="RGB">
          </div>

          <h2 class="titulo-sessao">Ajuste de Cores</h2>

          <div class="controls-container">
            <div class="color-item red-theme">
              <div class="info-row">
                <span>Red</span>
                <span class="val-badge">{{ red }}</span>
              </div>
              <input type="range" min="0" max="255" [(ngModel)]="red" (input)="onRangeChange()" class="slider range-red">
            </div>

            <div class="color-item green-theme">
              <div class="info-row">
                <span>Green</span>
                <span class="val-badge">{{ green }}</span>
              </div>
              <input type="range" min="0" max="255" [(ngModel)]="green" (input)="onRangeChange()" class="slider range-green">
            </div>

            <div class="color-item blue-theme">
              <div class="info-row">
                <span>Blue</span>
                <span class="val-badge">{{ blue }}</span>
              </div>
              <input type="range" min="0" max="255" [(ngModel)]="blue" (input)="onRangeChange()" class="slider range-blue">
            </div>
          </div>

          <div class="preview-box" [style.background-color]="previewColor">
            {{ hexColor }}
          </div>

          <div class="btn-group-vertical">
            <button class="btn-custom" [style.background-color]="btnColor" (click)="mudarCorBotao()">
              Aplicar no Botão
            </button>

            <button class="btn-custom default-red" (click)="mudarFundo()">
              Mudar Fundo
            </button>

            <button class="btn-custom default-red" (click)="voltar()">
              Voltar
            </button>
          </div>

        </div>
      </div>
    </div>

  </div>
</ion-content>
